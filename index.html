<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <title>ストリーチ 3.0 GUI</title>
    <style>
      /* ❌ 邪魔でうざかった「緑の帯」や「色反転フィルター」は完全に地球上から消去しました */
      html, body {
        width: 100%; height: 100%; margin: 0; padding: 0;
        overflow: hidden; background-color: #ffffff;
      }
      iframe {
        width: 125%; height: 125%; border: none;
        transform: scale(0.8);
        transform-origin: top left;
      }
    </style>
  </head>
  <body>
    <script>
      // 💡 エディタのバグを防ぎつつ、拡張機能を強制合体させます
      const site1 = "https://mssbgc";
      const site2 = ".github.io/scratch/";
      const baseSite = site1 + site2;
      
      const ext1 = "https://sheeptester";
      const ext2 = ".github.io/scratch-gui/generated-extensions/custom-blocks.js";
      const extSite = ext1 + ext2;
      
      // 本家エディタに「サイズ限界突破」と「カスタムブロック」を同時に注入する命令
      const fullURL = baseSite + "?turbo=true&addons=drag-past-edge,clones&extension=" + extSite;
      
      const iframe = document.createElement('iframe');
      iframe.src = fullURL;
      document.body.appendChild(iframe);
    </script>
  </body>
</html>
