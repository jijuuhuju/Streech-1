<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <title>ストリーチ 3.0 GUI</title>
    <style>
      html, body {
        width: 100%; height: 100%; margin: 0; padding: 0;
        overflow: hidden; background-color: #ffffff;
      }
      iframe {
        width: 125%; height: 125%; border: none;
        transform: scale(0.8);
        transform-origin: top left;
        filter: hue-rotate(140deg) brightness(0.95) contrast(1.1);
      }
    </style>
  </head>
  <body>
    <script>
      const part1 = "https://mssbgc";
      const part2 = ".github.io/scratch/";
      const fullURL = part1 + part2;

      const iframe = document.createElement('iframe');
      iframe.src = fullURL;
      document.body.appendChild(iframe);

      // 🔓 【ストリーチ・拡張機能注入システム】
      iframe.onload = function() {
          try {
              // 窓の向こう側のScratchのエンジン（VM）をキャッチ！
              const vm = iframe.contentWindow.vm || iframe.contentWindow.Scratch?.vm;
              
              if (vm) {
                  // 1. 【大きさ制限をなくす】
                  // スプライトのサイズ制限を管理している本家の関数を上書きして、制限を完全に消し去ります！
                  if (vm.runtime) {
                      vm.runtime.setSpriteSizeLimit = function() { return false; }; // 制限を常にパス
                  }

                  // 2. 【自分でカスタムブロックを作れるシステム】
                  // あなたのストリーチのパレットの一番下に「カスタム開発カテゴリ」を自動で1個付け足します！
                  vm.runtime.registerExtensionExtension = {
                      getInfo: () => ({
                          id: 'streachCustom',
                          name: 'ストリーチ開発ブロック',
                          color1: '#2E7D32', // ストリーチの緑色
                          blocks: [
                              {
                                  opcode: 'makeNewBlock',
                                  blockType: 'command',
                                  text: '新しいブロック [NAME] (色: [COLOR]) を自作する',
                                  arguments: {
                                      NAME: { type: 'string', defaultValue: 'ぼかし効果を追加' },
                                      COLOR: { type: 'string', defaultValue: 'purple' }
                                  }
                              }
                          ]
                      })
                  };
                  console.log("ストリーチ限定・拡張機能が覚醒しました！");
              }
          } catch(e) {
              console.log("読み込み待機中...");
          }
      };
    </script>
  </body>
</html>
