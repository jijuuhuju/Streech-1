<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <title>ストリーチ 3.0 GUI</title>
    <style>
      html, body {
        width: 100%; height: 100%; margin: 0; padding: 0;
        overflow: hidden; background-color: #1B5E20; /* 周りを深い緑にする */
      }
      iframe {
        width: 125%; height: 125%; border: none;
        transform: scale(0.8); /* 画面サイズを80%に縮小してスッキリさせる */
        transform-origin: top left;
        filter: hue-rotate(140deg); /* 青色を完全にストリーチの「緑色」に反転させる */
      }
    </style>
  </head>
  <body>
    <!-- JavaScriptを使って、エディタに邪魔されずにURLを強制合体させて窓を作ります -->
    <script>
      const part1 = "https://mssbgc";
      const part2 = ".github.io/scratch/";
      const fullURL = part1 + part2;

      const iframe = document.createElement('iframe');
      iframe.src = fullURL;
      document.body.appendChild(iframe);
    </script>
  </body>
</html>
