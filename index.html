<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <title>ストリーチ 3.0 GUI</title>
    <style>
      html, body {
        width: 100%; height: 100%; margin: 0; padding: 0;
        overflow: hidden; background-color: #ffffff; /* 背景をいつもの白に戻す */
      }
      
      /* 魔法の窓の大きさをiPadにぴったり合わせる */
      iframe {
        width: 125%; height: 125%; border: none;
        transform: scale(0.8);
        transform-origin: top left;
        
        /* ❌ 全体の色反転（hue-rotate）は目に優しくないので削除しました！ */
      }

      /* 👇 ここがプロの裏ワザ！窓の上から「緑色の細長い帯」を重ねてヘッダーを緑にします */
      .streach-header-cover {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 40px; /* 本家の青いヘッダーと同じ高さ */
        background-color: #2E7D32; /* ストリーチのフォレストグリーン */
        opacity: 0.85; /* 少し透明にして、下の文字やアカウントをうっすら透かす */
        pointer-events: none; /* タップしても下のボタンがちゃんと押せる設定 */
      }
    </style>
  </head>
  <body>
    <!-- 緑のヘッダーカバーを上に重ねます -->
    <div class="streach-header-cover"></div>

    <script>
      const part1 = "https://mssbgc";
      const part2 = ".github.io/scratch/";
      const fullURL = part1 + part2;

      const iframe = document.createElement('iframe');
      iframe.src = fullURL;
      document.body.appendChild(iframe);
    </script>
  </body>
</html>
