<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <link rel="shortcut icon" href="https://github.io">
    <title>ストリーチ 3.0 GUI</title>
    <!-- あなたが作った緑のテーマ -->
    <link rel="stylesheet" href="streach-style.css">

      /* 画面いっぱいにストリーチを展開する設定 */

    <iframe src="https://mssbgc.github.io/scratch/"></iframe>
  </body>
